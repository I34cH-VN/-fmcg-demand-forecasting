services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: demand_forecast
      POSTGRES_USER: demand_user
      POSTGRES_PASSWORD: demand_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demand_user -d demand_forecast"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    environment:
      DATABASE_URL: postgresql://demand_user:demand_password@postgres:5432/demand_forecast
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./outputs:/app/outputs
      - ./reports:/app/reports
      - ./models:/app/models
      - ./data/processed:/app/data/processed

volumes:
  postgres_data:
